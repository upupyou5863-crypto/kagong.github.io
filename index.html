<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>카공맵</title>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=b1ee2206235312119496a93a1396ebfe&autoload=false"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  overflow: hidden;
}

/* TAB */
.tab {
  position: absolute;
  inset: 0;
  opacity: 0;
  transform: translateX(20px);
  transition: all .25s ease;
  pointer-events: none;
}

.tab.active {
  opacity: 1;
  transform: translateX(0);
  pointer-events: auto;
}

/* MAP */
#map {
  position: absolute;
  inset: 0;
}

/* SHEET */
#sheet {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 64px;

  height: 80vh;
  background: #fff;
  border-radius: 24px 24px 0 0;

  transform: translateY(45vh);
  transition: transform .35s cubic-bezier(.2,.8,.2,1);

  z-index: 10;
}

/* CARD */
.card {
  margin: 10px;
  padding: 12px;
  background: #f6f7f9;
  border-radius: 12px;
  transition: .2s;
}

/* NAV */
#nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;

  height: 64px;
  background: #fff;

  display: flex;
  border-top: 1px solid #e5e8eb;

  z-index: 9999;
}
#nav button {
  flex: 1;
  border: none;
  background: none;
  font-weight: 700;
}
</style>
</head>

<body>

<!-- MAP -->
<div class="tab active" id="tab-map">
  <div id="map"></div>

  <div id="sheet">
    <div style="padding:12px;font-weight:800;">☕ 카공스팟</div>
    <div id="list"></div>
  </div>
</div>

<!-- SEARCH -->
<div class="tab" id="tab-search">
  <div style="padding:20px;font-weight:800;">🔍 탐색</div>
  <div id="search"></div>
</div>

<!-- SAVED -->
<div class="tab" id="tab-saved">
  <div style="padding:20px;font-weight:800;">🔖 저장</div>
  <div id="saved"></div>
</div>

<!-- NAV -->
<div id="nav">
  <button>지도</button>
  <button>탐색</button>
  <button>저장</button>
</div>

<script>

let map;
let cafes = [];
let markers = [];

let favorites = JSON.parse(localStorage.getItem("fav") || "[]");

const tabs = ["map", "search", "saved"];
let currentTabIndex = 0;

/* ---------------- MAP INIT ---------------- */
function initMap() {

  navigator.geolocation.getCurrentPosition(pos => {

    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    kakao.maps.load(() => {

      map = new kakao.maps.Map(document.getElementById("map"), {
        center: new kakao.maps.LatLng(lat, lng),
        level: 4
      });

      loadCafes(lat, lng);

    });

  });

}

/* ---------------- API ---------------- */
function loadCafes(lat, lng) {

  fetch(`https://dapi.kakao.com/v2/local/search/category.json?category_group_code=CE7&x=${lng}&y=${lat}&radius=2000`, {
    headers: {
      Authorization: "KakaoAK f64af25a6e2e1c0257b190e0a21c8d70"
    }
  })
  .then(r => r.json())
  .then(data => {

    cafes = data.documents
      .filter(c =>
        c.category_name.includes("카페") ||
        c.category_name.includes("커피")
      )
      .map(build);

    renderList();
    renderMap();
  });
}

/* ---------------- BUILD ---------------- */
function build(c) {

  let score = 3;

  if (c.place_name.includes("스터디")) score += 1;
  if (c.place_name.includes("라운지")) score += 1;
  if (c.place_name.includes("24")) score += 0.5;

  return {
    name: c.place_name,
    address: c.address_name,
    lat: c.y,
    lng: c.x,
    score: Math.max(1, Math.min(5, score))
  };
}

/* ---------------- MAP ---------------- */
function renderMap() {

  markers.forEach(m => m.setMap(null));
  markers = [];

  cafes.forEach(c => {

    const el = document.createElement("div");
    el.innerText = "☕ " + c.name;

    el.style = `
      background:#3182F6;
      color:#fff;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      border:2px solid #fff;
    `;

    const m = new kakao.maps.CustomOverlay({
      position: new kakao.maps.LatLng(c.lat, c.lng),
      content: el,
      yAnchor: 1
    });

    m.setMap(map);
    markers.push(m);

    el.onclick = () => highlight(c);
  });
}

/* ---------------- LIST ---------------- */
function renderList() {

  const el = document.getElementById("list");
  el.innerHTML = "";

  cafes.forEach(c => {

    const div = document.createElement("div");
    div.className = "card";

    const isFav = favorites.find(f => f.name === c.name);

    div.innerHTML = `
      <b>${c.name}</b> ⭐ ${c.score.toFixed(1)}
      <div>${c.address}</div>

      <button onclick='save(${JSON.stringify(c)})'>
        ${isFav ? "저장됨" : "저장"}
      </button>
    `;

    el.appendChild(div);
  });
}

/* ---------------- SAVE ---------------- */
function save(c) {

  let fav = JSON.parse(localStorage.getItem("fav") || "[]");

  const exists = fav.find(f => f.name === c.name);

  if (exists) fav = fav.filter(f => f.name !== c.name);
  else fav.push(c);

  localStorage.setItem("fav", JSON.stringify(fav));
  favorites = fav;

  renderList();
}

/* ---------------- HIGHLIGHT ---------------- */
function highlight(c) {

  document.querySelectorAll(".card").forEach(card => {

    if (card.innerText.includes(c.name)) {
      card.style.border = "2px solid #3182F6";
      card.scrollIntoView({ behavior:"smooth", block:"center" });
    }
  });
}

/* ---------------- TAB ---------------- */
function goToTab(i) {

  currentTabIndex = Math.max(0, Math.min(tabs.length - 1, i));

  const tab = tabs[currentTabIndex];

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById("tab-" + tab).classList.add("active");

  if (tab === "saved") renderSaved();
  if (tab === "search") renderSearch();
}

/* ---------------- SWIPE ---------------- */
let startX = 0;
let startY = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e => {

  const dx = e.changedTouches[0].clientX - startX;
  const dy = Math.abs(e.changedTouches[0].clientY - startY);

  if (dy > 50) return;

  if (dx > 50) goToTab(currentTabIndex - 1);
  if (dx < -50) goToTab(currentTabIndex + 1);
});

/* ---------------- SAVED ---------------- */
function renderSaved() {

  const el = document.getElementById("saved");
  const data = JSON.parse(localStorage.getItem("fav") || "[]");

  el.innerHTML = "";

  data.forEach(c => {
    const d = document.createElement("div");
    d.className = "card";
    d.innerHTML = `<b>${c.name}</b><br/>${c.address}`;
    el.appendChild(d);
  });
}

/* ---------------- SEARCH ---------------- */
function renderSearch() {

  const el = document.getElementById("search");
  el.innerHTML = "";

  cafes.forEach(c => {
    const d = document.createElement("div");
    d.className = "card";
    d.innerHTML = `<b>${c.name}</b><br/>${c.address}`;
    el.appendChild(d);
  });
}

/* ---------------- START ---------------- */
window.onload = initMap;

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>카공스팟</title>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=b1ee2206235312119496a93a1396ebfe&autoload=false"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: -apple-system, sans-serif;
}

/* 지도 */
#kakao-map {
  position: absolute;
  inset: 0;
  z-index: 1;
}

/* bottom sheet UI */
#sheet {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;

  z-index: 10;

  background: #fff;
  border-radius: 24px 24px 0 0;

  height: 45vh;
  max-height: 45vh;

  box-shadow: 0 -10px 30px rgba(0,0,0,.15);

  display: flex;
  flex-direction: column;
}

/* handle */
#handle {
  width: 40px;
  height: 5px;
  background: #E5E8EB;
  border-radius: 100px;
  margin: 10px auto;
}

/* header */
.header {
  padding: 0 16px 10px;
  font-size: 18px;
  font-weight: 800;
  color: #111;
}

/* list */
#list {
  flex: 1;
  overflow-y: auto;
  padding: 0 16px 16px;
}

/* card */
.card {
  background: #F6F7F9;
  padding: 12px;
  border-radius: 14px;
  margin-bottom: 10px;
  cursor: pointer;
}

.card-title {
  font-weight: 700;
  font-size: 14px;
}

.card-sub {
  font-size: 12px;
  color: #666;
  margin-top: 4px;
}

/* marker */
.marker {
  background: #3182F6;
  color: #fff;
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
  border: 2px solid #fff;
  white-space: nowrap;
}
</style>
</head>

<body>

<div id="kakao-map"></div>

<div id="sheet">
  <div id="handle"></div>
  <div class="header">☕ 카공스팟</div>
  <div id="list"></div>
</div>

<script>

let map;
let cafes = [];
let markers = [];

/* ───────────────
   지도 초기화
──────────────── */
function initMap() {

  navigator.geolocation.getCurrentPosition(pos => {

    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    kakao.maps.load(() => {

      map = new kakao.maps.Map(document.getElementById("kakao-map"), {
        center: new kakao.maps.LatLng(lat, lng),
        level: 4
      });

      // 내 위치
      new kakao.maps.Marker({
        map,
        position: new kakao.maps.LatLng(lat, lng)
      });

      loadCafes(lat, lng);
    });

  });

}

/* ───────────────
   카페 API
──────────────── */
function loadCafes(lat, lng) {

  fetch(`https://dapi.kakao.com/v2/local/search/category.json?category_group_code=CE7&x=${lng}&y=${lat}&radius=2000`, {
    headers: {
      Authorization: "f64af25a6e2e1c0257b190e0a21c8d70"
    }
  })
  .then(res => res.json())
  .then(data => {

    cafes = (data.documents || []).map(p => ({
      name: p.place_name,
      lat: p.y,
      lng: p.x,
      address: p.address_name
    }));

    renderMap();
    renderList();
  });

}

/* ───────────────
   마커 렌더
──────────────── */
function renderMap() {

  markers.forEach(m => m.setMap(null));
  markers = [];

  cafes.forEach(c => {

    const el = document.createElement("div");
    el.className = "marker";
    el.innerText = "☕ " + c.name;

    const marker = new kakao.maps.CustomOverlay({
      position: new kakao.maps.LatLng(c.lat, c.lng),
      content: el,
      yAnchor: 1
    });

    marker.setMap(map);
    markers.push(marker);
  });

}

/* ───────────────
   리스트 UI
──────────────── */
function renderList() {

  const list = document.getElementById("list");
  list.innerHTML = "";

  cafes.forEach(c => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="card-title">${c.name}</div>
      <div class="card-sub">${c.address}</div>
    `;

    div.onclick = () => {
      map.setCenter(new kakao.maps.LatLng(c.lat, c.lng));
    };

    list.appendChild(div);
  });

}

/* ───────────────
   실행
──────────────── */
window.onload = initMap;

</script>

</body>
</html>

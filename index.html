<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>카공스팟</title>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=b1ee2206235312119496a93a1396ebfe"></script>

<style>
body { margin:0; font-family:'Noto Sans KR', sans-serif; background:#F2F4F6; }
#kakao-map { position:absolute; inset:0; }

/* ── 마커 ── */
.map-marker{
  background:#3182F6;
  color:#fff;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
  border:2px solid #fff;
  white-space:nowrap;
  box-shadow:0 4px 10px rgba(49,130,246,.3);
}

/* ── UI 오버레이 (너 기존 UI 자리) ── */
#ui {
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  height:260px;
  background:#fff;
  border-radius:20px 20px 0 0;
  padding:16px;
  overflow:auto;
  box-shadow:0 -6px 20px rgba(0,0,0,.1);
}

.card {
  background:#F9FAFB;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div id="kakao-map"></div>

<!-- UI 영역 (너 기존 UI 여기 붙이면 됨) -->
<div id="ui">
  <h3>☕ 카공스팟</h3>
  <div id="list"></div>
</div>

<script>

let map;
let markers = [];
let cafes = [];

/* ─────────────────────────
   1. 지도 초기화 + 현재 위치
───────────────────────── */
function initMap() {

  navigator.geolocation.getCurrentPosition(pos => {

    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    map = new kakao.maps.Map(document.getElementById('kakao-map'), {
      center: new kakao.maps.LatLng(lat, lng),
      level: 4
    });

    // 내 위치
    new kakao.maps.Marker({
      map,
      position: new kakao.maps.LatLng(lat, lng)
    });

    loadNearbyCafes(lat, lng);
  });

}

/* ─────────────────────────
   2. 카카오 API 호출
───────────────────────── */
function loadNearbyCafes(lat, lng) {

  fetch(`https://dapi.kakao.com/v2/local/search/category.json?category_group_code=CE7&x=${lng}&y=${lat}&radius=2000`, {
    headers: {
      Authorization: "KakaoAK YOUR_REST_API_KEY"
    }
  })
  .then(res => res.json())
  .then(data => {

    cafes = data.documents.map(p => ({
      id: p.id,
      name: p.place_name,
      lat: p.y,
      lng: p.x,
      address: p.address_name
    }));

    renderMap();
    renderList();
  });

}

/* ─────────────────────────
   3. 지도 마커
───────────────────────── */
function renderMap() {

  markers.forEach(m => m.setMap(null));
  markers = [];

  cafes.forEach(c => {

    const el = document.createElement('div');
    el.className = 'map-marker';
    el.innerText = "☕ " + c.name;

    const marker = new kakao.maps.CustomOverlay({
      position: new kakao.maps.LatLng(c.lat, c.lng),
      content: el,
      yAnchor: 1
    });

    marker.setMap(map);
    markers.push(marker);
  });

}

/* ─────────────────────────
   4. 리스트 (너 UI 연결 포인트)
───────────────────────── */
function renderList() {

  const list = document.getElementById('list');
  list.innerHTML = '';

  cafes.forEach(c => {

    const div = document.createElement('div');
    div.className = 'card';

    div.innerHTML = `
      <div style="font-weight:700">${c.name}</div>
      <div style="font-size:12px;color:#666">${c.address}</div>
    `;

    div.onclick = () => {
      map.setCenter(new kakao.maps.LatLng(c.lat, c.lng));
    };

    list.appendChild(div);
  });
}

/* ─────────────────────────
   실행
───────────────────────── */
window.onload = initMap;

</script>

</body>
</html>

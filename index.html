<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>카공스팟</title>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=b1ee2206235312119496a93a1396ebfe&autoload=false"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: -apple-system, sans-serif;
}

/* 지도 */
#kakao-map {
  position: absolute;
  inset: 0;
  z-index: 1;
}

/* sheet */
#sheet {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;

  z-index: 10;

  background: #fff;
  border-radius: 24px 24px 0 0;

  height: 80vh;

  transform: translateY(45vh);

  box-shadow: 0 -10px 30px rgba(0,0,0,.15);

  display: flex;
  flex-direction: column;

  will-change: transform;
}

#handle {
  width: 40px;
  height: 5px;
  background: #E5E8EB;
  border-radius: 999px;
  margin: 10px auto;
  cursor: grab;
}

.header {
  padding: 0 16px 10px;
  font-size: 18px;
  font-weight: 800;
}

#list {
  flex: 1;
  overflow-y: auto;
  padding: 0 16px 16px;
}

/* 카드 */
.card {
  background: #F6F7F9;
  padding: 12px;
  border-radius: 14px;
  margin-bottom: 10px;
  transition: all .2s;
}

.card-title {
  font-weight: 700;
  font-size: 14px;
}

.card-sub {
  font-size: 12px;
  color: #666;
  margin-top: 4px;
}

/* 버튼 */
.save-btn {
  margin-top: 8px;
  padding: 6px 10px;
  border-radius: 8px;
  border: none;
  font-size: 12px;
}

/* 필터 */
.filter-bar {
  display: flex;
  gap: 6px;
  padding: 8px 12px;
}

.filter-btn {
  padding: 6px 10px;
  border-radius: 999px;
  border: 1px solid #ddd;
  background: #fff;
  font-size: 12px;
}

.filter-btn.active {
  background: #3182F6;
  color: #fff;
  border-color: #3182F6;
}
</style>
</head>

<body>

<div id="kakao-map"></div>

<div id="sheet">
  <div id="handle"></div>

  <div class="header">☕ 카공스팟</div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all')">전체</button>
    <button class="filter-btn" onclick="setFilter('high')">집중</button>
    <button class="filter-btn" onclick="setFilter('long')">장시간</button>
  </div>

  <div id="list"></div>
</div>

<script>

let map;
let cafes = [];
let markers = [];
let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");

let currentFilter = "all";
let activeCafe = null;

/* ---------------- 지도 ---------------- */
function initMap() {

  navigator.geolocation.getCurrentPosition(pos => {

    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    kakao.maps.load(() => {

      map = new kakao.maps.Map(document.getElementById("kakao-map"), {
        center: new kakao.maps.LatLng(lat, lng),
        level: 4
      });

      loadCafes(lat, lng);

      kakao.maps.event.addListener(map, "click", () => {
        setSheet(70);
        resetHighlight();
      });

    });

  });

}

/* ---------------- API ---------------- */
function loadCafes(lat, lng) {

  fetch(`https://dapi.kakao.com/v2/local/search/category.json?category_group_code=CE7&x=${lng}&y=${lat}&radius=2000`, {
    headers: {
      Authorization: "KakaoAK f64af25a6e2e1c0257b190e0a21c8d70"
    }
  })
  .then(res => res.json())
  .then(data => {

    cafes = data.documents.map(c => buildCafe(c));

    renderList();
    renderMap();
  });

}

/* ---------------- 점수 모델 ---------------- */
function buildCafe(c) {

  let score = 3;

  if (c.place_name.includes("스터디") || c.place_name.includes("라운지")) score += 1.5;
  if (c.place_name.includes("24")) score += 1;
  if (c.place_name.includes("스타벅스")) score -= 0.3;

  return {
    name: c.place_name,
    address: c.address_name,
    lat: c.y,
    lng: c.x,
    score: Math.max(1, Math.min(5, score))
  };
}

/* ---------------- 필터 ---------------- */
function setFilter(type) {
  currentFilter = type;

  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");

  renderList();
}

/* ---------------- 필터 로직 ---------------- */
function applyFilter(list) {

  return list.filter(c => {

    if (currentFilter === "high") return c.score >= 4;
    if (currentFilter === "long") return c.score >= 3.8;

    return true;
  });
}

/* ---------------- 리스트 ---------------- */
function renderList() {

  const list = document.getElementById("list");
  list.innerHTML = "";

  let filtered = applyFilter(cafes);

  filtered.forEach(c => {

    const div = document.createElement("div");
    div.className = "card";

    const isFav = favorites.some(f => f.name === c.name);

    div.innerHTML = `
      <div class="card-title">${c.name} ⭐ ${c.score.toFixed(1)}</div>
      <div class="card-sub">${c.address}</div>

      <button class="save-btn"
        onclick='toggleFavorite(${JSON.stringify(c)})'
        style="background:${isFav ? '#3182F6':'#E5E8EB'};color:${isFav?'#fff':'#000'}">
        ${isFav ? "저장됨" : "저장"}
      </button>
    `;

    div.onclick = () => highlightFromList(c.name);

    list.appendChild(div);
  });
}

/* ---------------- 지도 ---------------- */
function renderMap() {

  markers.forEach(m => m.setMap(null));
  markers = [];

  cafes.forEach(c => {

    const el = document.createElement("div");
    el.innerText = "☕ " + c.name;

    el.style = `
      background:#3182F6;
      color:#fff;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      border:2px solid #fff;
      transition:.2s;
    `;

    const marker = new kakao.maps.CustomOverlay({
      position: new kakao.maps.LatLng(c.lat, c.lng),
      content: el,
      yAnchor: 1
    });

    marker.setMap(map);
    markers.push(marker);

    el.onclick = () => highlightFromMap(c);
  });
}

/* ---------------- 하이라이트 ---------------- */
function highlightFromMap(c) {

  resetHighlight();
  activeCafe = c.name;

  setSheet(45);

  scrollToCard(c.name);
}

function highlightFromList(name) {

  resetHighlight();

  activeCafe = name;
}

/* ---------------- 카드 이동 ---------------- */
function scrollToCard(name) {

  document.querySelectorAll(".card").forEach(card => {

    if (card.innerText.includes(name)) {

      card.style.transform = "scale(1.03)";
      card.style.boxShadow = "0 6px 20px rgba(49,130,246,.2)";
      card.style.border = "1px solid #3182F6";

      card.scrollIntoView({ behavior: "smooth", block: "center" });
    }
  });
}

/* ---------------- reset ---------------- */
function resetHighlight() {

  document.querySelectorAll(".card").forEach(c => {
    c.style = "";
  });

  markers.forEach(m => {
    const el = m.getContent();
    if (el) {
      el.style.background = "#3182F6";
      el.style.transform = "";
    }
  });
}

/* ---------------- 저장 ---------------- */
function toggleFavorite(cafe) {

  let fav = JSON.parse(localStorage.getItem("favorites") || "[]");

  const exists = fav.find(f => f.name === cafe.name);

  if (exists) {
    fav = fav.filter(f => f.name !== cafe.name);
  } else {
    fav.push(cafe);
  }

  localStorage.setItem("favorites", JSON.stringify(fav));
  favorites = fav;

  renderList();
}

/* ---------------- bottom sheet ---------------- */
let sheet = document.getElementById("sheet");
let startY, startT, current = 45, dragging = false, velocity = 0;

function setSheet(v, anim=true) {
  sheet.style.transition = anim ? "0.3s cubic-bezier(.2,.8,.2,1)" : "none";
  sheet.style.transform = `translateY(${v}vh)`;
  current = v;
}

document.getElementById("handle").addEventListener("mousedown", start);
document.getElementById("handle").addEventListener("touchstart", start);

function start(e){
  dragging = true;
  startY = getY(e);
  startT = Date.now();
}

window.addEventListener("mousemove", move);
window.addEventListener("touchmove", move);

function move(e){
  if(!dragging) return;

  let y = getY(e);
  let diff = y - startY;

  let vh = current + (diff / window.innerHeight) * 100;
  vh = Math.max(0, Math.min(70, vh));

  setSheet(vh, false);
}

window.addEventListener("mouseup", end);
window.addEventListener("touchend", end);

function end(){
  if(!dragging) return;
  dragging = false;

  let snaps = [0, 25, 45, 70];

  let closest = snaps.reduce((a,b)=>
    Math.abs(b-current) < Math.abs(a-current) ? b : a
  );

  setSheet(closest);
}

function getY(e){
  return e.touches ? e.touches[0].clientY : e.clientY;
}

/* ---------------- start ---------------- */
window.onload = initMap;

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>카공스팟</title>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=b1ee2206235312119496a93a1396ebfe"></script>

<style>
body { margin:0; font-family:sans-serif; }
#kakao-map { width:100%; height:100vh; }

.map-marker{
  background:#3182F6;
  color:#fff;
  padding:6px 10px;
  border-radius:20px;
  font-size:12px;
  font-weight:700;
  border:2px solid #fff;
  white-space:nowrap;
}
</style>
</head>

<body>

<div id="kakao-map"></div>

<script>

let map;
let markers = [];
let cafes = [];

/* -----------------------------
   1. 지도 초기화 + 현재 위치
------------------------------ */
function initMap() {

  navigator.geolocation.getCurrentPosition(pos => {

    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    map = new kakao.maps.Map(document.getElementById('kakao-map'), {
      center: new kakao.maps.LatLng(lat, lng),
      level: 4
    });

    // 내 위치 마커
    new kakao.maps.Marker({
      map: map,
      position: new kakao.maps.LatLng(lat, lng)
    });

    loadNearbyCafes(lat, lng);
  });

}

/* -----------------------------
   2. 카카오 API로 카페 가져오기
------------------------------ */
function loadNearbyCafes(lat, lng) {

  fetch(`https://dapi.kakao.com/v2/local/search/category.json?category_group_code=CE7&x=${lng}&y=${lat}&radius=2000`, {
    headers: {
      Authorization: "KakaoAK YOUR_REST_API_KEY"
    }
  })
  .then(res => res.json())
  .then(data => {

    cafes = data.documents.map(p => ({
      name: p.place_name,
      lat: p.y,
      lng: p.x
    }));

    renderMarkers();
  });

}

/* -----------------------------
   3. 지도 마커 렌더링
------------------------------ */
function renderMarkers() {

  // 기존 마커 제거
  markers.forEach(m => m.setMap(null));
  markers = [];

  cafes.forEach(c => {

    const el = document.createElement('div');
    el.className = 'map-marker';
    el.innerText = "☕ " + c.name;

    const marker = new kakao.maps.CustomOverlay({
      position: new kakao.maps.LatLng(c.lat, c.lng),
      content: el,
      yAnchor: 1
    });

    marker.setMap(map);
    markers.push(marker);
  });

}

/* -----------------------------
   실행
------------------------------ */
window.onload = initMap;

</script>

</body>
</html>

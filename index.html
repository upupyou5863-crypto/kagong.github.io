<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>카공스팟</title>

<!-- ✔ 안정 SDK 로딩 -->
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=b1ee2206235312119496a93a1396ebfe&autoload=false"></script>

<style>
body { margin:0; font-family:sans-serif; }
#kakao-map { width:100%; height:100vh; }

.map-marker{
  background:#3182F6;
  color:#fff;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
  border:2px solid #fff;
  white-space:nowrap;
  box-shadow:0 4px 10px rgba(0,0,0,.15);
}
</style>
</head>

<body>

<div id="kakao-map"></div>

<script>

let map;
let markers = [];
let cafes = [];

/* ─────────────────────────
   안전 지도 초기화
───────────────────────── */
function initMap() {

  if (!navigator.geolocation) {
    alert("이 브라우저는 위치 기능을 지원하지 않습니다.");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    (pos) => {

      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

      kakao.maps.load(function () {

        map = new kakao.maps.Map(document.getElementById('kakao-map'), {
          center: new kakao.maps.LatLng(lat, lng),
          level: 4
        });

        // 내 위치 마커
        new kakao.maps.Marker({
          map,
          position: new kakao.maps.LatLng(lat, lng)
        });

        loadNearbyCafes(lat, lng);
      });

    },
    (err) => {
      alert("위치 권한을 허용해야 사용 가능합니다.");
      console.log(err);
    }
  );
}

/* ─────────────────────────
   안전 API 호출
───────────────────────── */
function loadNearbyCafes(lat, lng) {

  fetch(`https://dapi.kakao.com/v2/local/search/category.json?category_group_code=CE7&x=${lng}&y=${lat}&radius=2000`, {
    headers: {
      Authorization: "KakaoAK YOUR_REST_API_KEY"
    }
  })
  .then(res => res.json())
  .then(data => {

    if (!data || !data.documents) {
      console.warn("API 응답 없음");
      return;
    }

    cafes = data.documents.map(p => ({
      id: p.id,
      name: p.place_name,
      lat: p.y,
      lng: p.x,
      address: p.address_name || ""
    }));

    renderMarkers();

  })
  .catch(err => {
    console.error("API 오류:", err);
  });
}

/* ─────────────────────────
   마커 렌더링
───────────────────────── */
function renderMarkers() {

  markers.forEach(m => m.setMap(null));
  markers = [];

  if (!cafes.length) return;

  cafes.forEach(c => {

    const el = document.createElement('div');
    el.className = 'map-marker';
    el.innerText = "☕ " + c.name;

    const marker = new kakao.maps.CustomOverlay({
      position: new kakao.maps.LatLng(c.lat, c.lng),
      content: el,
      yAnchor: 1
    });

    marker.setMap(map);
    markers.push(marker);
  });
}

/* ─────────────────────────
   실행
───────────────────────── */
window.onload = initMap;

</script>

</body>
</html>
